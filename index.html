<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase 데이터 관리 페이지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      font-family: Arial, sans-serif;
      color: #333;
    }

    .container {
      width: min(900px, 92%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .form-box {
      display: grid;
      grid-template-columns: 1fr 2fr auto;
      gap: 10px;
      margin-bottom: 22px;
    }

    input {
      height: 46px;
      padding: 0 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #42a5f5;
      box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      height: 46px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .add-btn {
      background: #42a5f5;
      color: white;
    }

    .refresh-btn {
      background: #66bb6a;
      color: white;
      margin-bottom: 16px;
    }

    .edit-btn {
      background: #ffca28;
      color: #333;
    }

    .delete-btn {
      background: #ef5350;
      color: white;
    }

    .save-btn {
      background: #7e57c2;
      color: white;
    }

    .cancel-btn {
      background: #b0bec5;
      color: white;
    }

    .status {
      min-height: 24px;
      margin-bottom: 14px;
      color: #555;
      font-size: 14px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      background: #f7f9fb;
      border: 1px solid #edf1f5;
    }

    .item-title {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: bold;
    }

    .item-content {
      margin: 0;
      color: #555;
      line-height: 1.5;
      word-break: break-all;
    }

    .item-date {
      margin-top: 8px;
      font-size: 12px;
      color: #999;
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .edit-box {
      display: grid;
      grid-template-columns: 1fr 2fr auto auto;
      gap: 8px;
      width: 100%;
    }

    .empty {
      text-align: center;
      padding: 30px;
      color: #888;
      background: #f7f9fb;
      border-radius: 16px;
    }

    @media (max-width: 700px) {
      .form-box,
      .item,
      .edit-box {
        grid-template-columns: 1fr;
      }

      .item-actions {
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Firebase 데이터 관리</h1>
    <div class="subtitle">Realtime Database와 연결된 간단한 CRUD 웹페이지</div>

    <div class="form-box">
      <input id="titleInput" type="text" placeholder="제목 입력" />
      <input id="contentInput" type="text" placeholder="내용 입력" />
      <button class="add-btn" onclick="addData()">추가</button>
    </div>

    <button class="refresh-btn" onclick="loadData()">데이터 새로고침</button>
    <div id="status" class="status"></div>
    <div id="dataList" class="list"></div>
  </div>

  <script>
    // Firebase Realtime Database URL
    const DATABASE_URL = 'https://dbsehdns-bfd1d-default-rtdb.firebaseio.com/';

    // 데이터를 저장할 위치입니다.
    // Firebase 콘솔에서는 items 아래에 데이터가 저장됩니다.
    const DATA_PATH = 'items';

    const titleInput = document.getElementById('titleInput');
    const contentInput = document.getElementById('contentInput');
    const dataList = document.getElementById('dataList');
    const statusBox = document.getElementById('status');

    function setStatus(message) {
      statusBox.textContent = message;
    }

    function getEndpoint(path = '') {
      const cleanPath = path ? `/${path}` : '';
      return `${DATABASE_URL}/${DATA_PATH}${cleanPath}.json`;
    }

    async function loadData() {
      try {
        setStatus('데이터를 불러오는 중입니다...');

        const response = await fetch(getEndpoint());
        const data = await response.json();

        renderData(data);
        setStatus('데이터를 불러왔습니다.');
      } catch (error) {
        console.error(error);
        setStatus('데이터 불러오기에 실패했습니다. Firebase 보안 규칙을 확인하세요.');
      }
    }

    async function addData() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!title || !content) {
        alert('제목과 내용을 모두 입력해주세요.');
        return;
      }

      const newItem = {
        title: title,
        content: content,
        createdAt: new Date().toLocaleString('ko-KR')
      };

      try {
        setStatus('데이터를 추가하는 중입니다...');

        await fetch(getEndpoint(), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(newItem)
        });

        titleInput.value = '';
        contentInput.value = '';
        await loadData();
      } catch (error) {
        console.error(error);
        setStatus('데이터 추가에 실패했습니다.');
      }
    }

    async function deleteData(id) {
      const isConfirmed = confirm('정말 삭제하시겠습니까?');
      if (!isConfirmed) return;

      try {
        setStatus('데이터를 삭제하는 중입니다...');

        await fetch(getEndpoint(id), {
          method: 'DELETE'
        });

        await loadData();
      } catch (error) {
        console.error(error);
        setStatus('데이터 삭제에 실패했습니다.');
      }
    }

    async function updateData(id) {
      const editTitle = document.getElementById(`edit-title-${id}`).value.trim();
      const editContent = document.getElementById(`edit-content-${id}`).value.trim();

      if (!editTitle || !editContent) {
        alert('수정할 제목과 내용을 모두 입력해주세요.');
        return;
      }

      const updatedItem = {
        title: editTitle,
        content: editContent,
        updatedAt: new Date().toLocaleString('ko-KR')
      };

      try {
        setStatus('데이터를 수정하는 중입니다...');

        await fetch(getEndpoint(id), {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(updatedItem)
        });

        await loadData();
      } catch (error) {
        console.error(error);
        setStatus('데이터 수정에 실패했습니다.');
      }
    }

    function renderData(data) {
      dataList.innerHTML = '';

      if (!data) {
        dataList.innerHTML = '<div class="empty">아직 저장된 데이터가 없습니다.</div>';
        return;
      }

      const entries = Object.entries(data).reverse();

      entries.forEach(([id, item]) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.id = `item-${id}`;

        div.innerHTML = `
          <div>
            <p class="item-title">${escapeHTML(item.title || '')}</p>
            <p class="item-content">${escapeHTML(item.content || '')}</p>
            <div class="item-date">
              생성: ${item.createdAt || '-'}
              ${item.updatedAt ? ` / 수정: ${item.updatedAt}` : ''}
            </div>
          </div>
          <div class="item-actions">
            <button class="edit-btn" onclick="showEditForm('${id}', '${escapeForAttribute(item.title || '')}', '${escapeForAttribute(item.content || '')}')">수정</button>
            <button class="delete-btn" onclick="deleteData('${id}')">삭제</button>
          </div>
        `;

        dataList.appendChild(div);
      });
    }

    function showEditForm(id, title, content) {
      const itemBox = document.getElementById(`item-${id}`);

      itemBox.innerHTML = `
        <div class="edit-box">
          <input id="edit-title-${id}" type="text" value="${title}" />
          <input id="edit-content-${id}" type="text" value="${content}" />
          <button class="save-btn" onclick="updateData('${id}')">저장</button>
          <button class="cancel-btn" onclick="loadData()">취소</button>
        </div>
      `;
    }

    function escapeHTML(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeForAttribute(text) {
      return escapeHTML(text).replaceAll('`', '&#096;');
    }

    // Enter 키로 데이터 추가
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && document.activeElement.tagName === 'INPUT') {
        const activeId = document.activeElement.id;
        if (activeId === 'titleInput' || activeId === 'contentInput') {
          addData();
        }
      }
    });

    // 페이지가 열리면 자동으로 데이터 조회
    loadData();
  </script>
</body>
</html>
